# Configuration for Unitree G1 (29 DoF) motion retargeting
#
# gmr_dof_names: joint names as they appear in the GMR output (MuJoCo order).
# lab_dof_names: joint names in the Isaac Lab / legged_lab order.
# lab_key_body_names: body links whose world-frame positions are recorded as
#                     key_body_pos during simulation replay.  Order must match
#                     the observation definition in your task config.

gmr_dof_names:
  - left_hip_pitch_joint
  - left_hip_roll_joint
  - left_hip_yaw_joint
  - left_knee_joint
  - left_ankle_pitch_joint
  - left_ankle_roll_joint
  - right_hip_pitch_joint
  - right_hip_roll_joint
  - right_hip_yaw_joint
  - right_knee_joint
  - right_ankle_pitch_joint
  - right_ankle_roll_joint
  - waist_yaw_joint
  - waist_roll_joint
  - waist_pitch_joint
  - left_shoulder_pitch_joint
  - left_shoulder_roll_joint
  - left_shoulder_yaw_joint
  - left_elbow_joint
  - left_wrist_roll_joint
  - left_wrist_pitch_joint
  - left_wrist_yaw_joint
  - right_shoulder_pitch_joint
  - right_shoulder_roll_joint
  - right_shoulder_yaw_joint
  - right_elbow_joint
  - right_wrist_roll_joint
  - right_wrist_pitch_joint
  - right_wrist_yaw_joint

lab_dof_names:
  - left_hip_pitch_joint
  - right_hip_pitch_joint
  - waist_yaw_joint
  - left_hip_roll_joint
  - right_hip_roll_joint
  - waist_roll_joint
  - left_hip_yaw_joint
  - right_hip_yaw_joint
  - waist_pitch_joint
  - left_knee_joint
  - right_knee_joint
  - left_shoulder_pitch_joint
  - right_shoulder_pitch_joint
  - left_ankle_pitch_joint
  - right_ankle_pitch_joint
  - left_shoulder_roll_joint
  - right_shoulder_roll_joint
  - left_ankle_roll_joint
  - right_ankle_roll_joint
  - left_shoulder_yaw_joint
  - right_shoulder_yaw_joint
  - left_elbow_joint
  - right_elbow_joint
  - left_wrist_roll_joint
  - right_wrist_roll_joint
  - left_wrist_pitch_joint
  - right_wrist_pitch_joint
  - left_wrist_yaw_joint
  - right_wrist_yaw_joint

# Names of the key bodies recorded as key_body_pos during simulation replay.
# Must match the names in the robot model used by Isaac Lab.
# Order must align with the observation definition in your task config.
lab_key_body_names:
  - left_ankle_roll_link
  - right_ankle_roll_link
  - left_wrist_yaw_link
  - right_wrist_yaw_link
  - left_shoulder_roll_link
  - right_shoulder_roll_link
